<div id="hvac-service-modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.75); z-index:9999; overflow-y:auto; padding:1.5rem;">
  <div id="hvac-service-modal" style="background:#fff; width:100%; max-width:600px; margin:2rem auto; border-radius:12px; position:relative; box-shadow:0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);">
    <div style="padding:1.5rem 1.75rem; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center;">
      <h2 style="margin:0; font-size:1.5rem; color:#0f172a; font-weight:700;">Request Local HVAC Service</h2>
      <button onclick="closeHvacServiceModal()" style="background:none; border:none; cursor:pointer; font-size:1.5rem; color:#64748b; padding:0.25rem;">&times;</button>
    </div>
    
    <div style="padding:1.75rem;">
      <p style="margin-top:0; color:#475569; margin-bottom:1.5rem;">Get fast, professional help for your residential AC system.</p>
      
      <form id="hvac-lead-form">
        <!-- Contact Info -->
        <h3 style="font-size:1.1rem; color:#1e293b; margin-bottom:1rem;">Contact Information</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem;">
          <div>
            <label style="display:block; font-size:0.9rem; font-weight:600; margin-bottom:0.25rem;">First Name *</label>
            <input type="text" name="first_name" required style="width:100%; padding:0.6rem; border:1px solid #cbd5e1; border-radius:6px;">
          </div>
          <div>
            <label style="display:block; font-size:0.9rem; font-weight:600; margin-bottom:0.25rem;">Last Name *</label>
            <input type="text" name="last_name" required style="width:100%; padding:0.6rem; border:1px solid #cbd5e1; border-radius:6px;">
          </div>
        </div>
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.5rem;">
          <div>
            <label style="display:block; font-size:0.9rem; font-weight:600; margin-bottom:0.25rem;">Phone Number *</label>
            <input type="tel" name="phone" required style="width:100%; padding:0.6rem; border:1px solid #cbd5e1; border-radius:6px;">
          </div>
          <div>
            <label style="display:block; font-size:0.9rem; font-weight:600; margin-bottom:0.25rem;">Email Address *</label>
            <input type="email" name="email" required style="width:100%; padding:0.6rem; border:1px solid #cbd5e1; border-radius:6px;">
          </div>
        </div>

        <!-- Service Location -->
        <h3 style="font-size:1.1rem; color:#1e293b; margin-bottom:1rem;">Service Location</h3>
        <div style="margin-bottom:1rem;">
          <label style="display:block; font-size:0.9rem; font-weight:600; margin-bottom:0.25rem;">Street Address *</label>
          <input type="text" name="street_address" required style="width:100%; padding:0.6rem; border:1px solid #cbd5e1; border-radius:6px;">
        </div>
        <div style="display:grid; grid-template-columns:2fr 1fr 1fr; gap:1rem; margin-bottom:1.5rem;">
          <div>
            <label style="display:block; font-size:0.9rem; font-weight:600; margin-bottom:0.25rem;">City *</label>
            <input type="text" name="city" required style="width:100%; padding:0.6rem; border:1px solid #cbd5e1; border-radius:6px;">
          </div>
          <div>
            <label style="display:block; font-size:0.9rem; font-weight:600; margin-bottom:0.25rem;">State *</label>
            <input type="text" name="state" required style="width:100%; padding:0.6rem; border:1px solid #cbd5e1; border-radius:6px;">
          </div>
          <div>
            <label style="display:block; font-size:0.9rem; font-weight:600; margin-bottom:0.25rem;">Zip Code *</label>
            <input type="text" name="zip" required style="width:100%; padding:0.6rem; border:1px solid #cbd5e1; border-radius:6px;">
          </div>
        </div>

        <!-- System Issue Details -->
        <h3 style="font-size:1.1rem; color:#1e293b; margin-bottom:1rem;">System Details</h3>
        <div style="margin-bottom:1rem;">
          <label style="display:block; font-size:0.9rem; font-weight:600; margin-bottom:0.25rem;">What service do you need? *</label>
          <select name="service_needed" required style="width:100%; padding:0.6rem; border:1px solid #cbd5e1; border-radius:6px; background:#fff;">
            <option value="">-- Please Select --</option>
            <option value="AC not cooling">AC not cooling</option>
            <option value="AC not turning on">AC not turning on</option>
            <option value="Weak airflow">Weak airflow</option>
            <option value="Thermostat issue">Thermostat issue</option>
            <option value="Frozen evaporator coil">Frozen evaporator coil</option>
            <option value="Refrigerant issue">Refrigerant issue</option>
            <option value="Water leak">Water leak</option>
            <option value="Strange noise">Strange noise</option>
            <option value="Emergency AC repair">Emergency AC repair</option>
            <option value="Maintenance / tune-up">Maintenance / tune-up</option>
            <option value="Replace system / quote">Replace system / quote</option>
          </select>
        </div>
        
        <div style="margin-bottom:1rem;">
          <label style="display:block; font-size:0.9rem; font-weight:600; margin-bottom:0.25rem;">Brief Problem Description</label>
          <textarea name="problem_description" rows="2" style="width:100%; padding:0.6rem; border:1px solid #cbd5e1; border-radius:6px;"></textarea>
        </div>

        <div style="margin-bottom:1.5rem;">
          <label style="display:block; font-size:0.9rem; font-weight:600; margin-bottom:0.25rem;">Preferred Timing *</label>
          <select name="preferred_timing" required style="width:100%; padding:0.6rem; border:1px solid #cbd5e1; border-radius:6px; background:#fff;">
            <option value="ASAP / emergency">ASAP / emergency</option>
            <option value="Today">Today</option>
            <option value="This week">This week</option>
            <option value="Just getting quotes">Just getting quotes</option>
          </select>
        </div>

        <div style="margin-bottom:1.5rem;">
          <label style="display:flex; align-items:flex-start; gap:0.5rem; font-size:0.85rem; color:#475569;">
            <input type="checkbox" name="consent_checkbox" required style="margin-top:0.2rem;">
            <span>I agree to receive SMS messages from HVAC Revenue Boost regarding your inquiry, including follow-ups, scheduling, and service-related updates. Message frequency varies. Msg &amp; data rates may apply. Reply STOP to opt out. Reply HELP for help.</span>
          </label>
        </div>

        <div id="hvac-form-status" style="margin-bottom:1rem; font-weight:600; display:none; padding:10px; border-radius:6px;"></div>

        <button type="submit" id="hvac-submit-btn" style="width:100%; background:#2563eb; color:#fff; padding:1rem; border:none; border-radius:6px; font-weight:700; font-size:1.1rem; cursor:pointer;">
          Submit Service Request
        </button>
      </form>
    </div>
  </div>
</div>

<script>
  function openHvacServiceModal() {
    document.getElementById('hvac-service-modal-overlay').style.display = 'block';
    document.body.style.overflow = 'hidden';
  }

  function closeHvacServiceModal() {
    document.getElementById('hvac-service-modal-overlay').style.display = 'none';
    document.body.style.overflow = '';
  }

  // Close modal when clicking outside of it
  document.getElementById('hvac-service-modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) {
      closeHvacServiceModal();
    }
  });

  const hvacForm = document.getElementById('hvac-lead-form');
  const hvacSubmitBtn = document.getElementById('hvac-submit-btn');
  const hvacFormStatus = document.getElementById('hvac-form-status');

  if (hvacForm) {
    hvacForm.addEventListener('submit', function(e) {
      e.preventDefault();
      
      hvacSubmitBtn.textContent = 'Submitting...';
      hvacSubmitBtn.disabled = true;
      hvacSubmitBtn.style.opacity = '0.7';
      
      // Simulate submission endpoint processing
      setTimeout(() => {
        hvacFormStatus.style.display = 'block';
        hvacFormStatus.style.backgroundColor = '#dcfce7';
        hvacFormStatus.style.color = '#166534';
        hvacFormStatus.style.border = '1px solid #86efac';
        hvacFormStatus.textContent = "Your request has been received! A local HVAC expert will reach out to you shortly.";
        hvacForm.reset();
        
        hvacSubmitBtn.textContent = 'Service Requested';
      }, 1500);
    });
  }
</script>
